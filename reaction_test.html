<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应速度测试</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:微软雅黑;
            background:#f5f5f5;
        }
        .container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }
        /* 测试盒固定宽高 */
        #box{
            width:500px;
            height:350px;
            background:#3474e6;
            border-radius:16px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#fff;
            font-size:28px;
            cursor:pointer;
            transition:background 0.2s;
        }
        /* 信息栏和测试盒同宽 */
        .info{
            width:500px;
            font-size:20px;
            color:#333;
            display:flex;
            justify-content:space-between;
            align-items:center;
            height:36px;
        }
        /* 返回按钮：圆角、靠右 */
        .exit{
            padding:8px 24px;
            font-size:16px;
            color:#fff;
            background:#ff4444;
            border-radius:30px;
            text-decoration:none;
            font-weight:bold;
            white-space:nowrap;
        }
        .exit:hover{
            background:#cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="box">点击此处开始测试-hyc</div>
        <div class="info">
            <div>你的成绩: <span id="res"> -- </span> ms</div>
            <a href="index.html" class="exit">返回首页</a>
        </div>
    </div>

<script>
let start = 0;
let isWait = false;
let isStart = false;
let timer = null; 
let isError = false;
const box = document.getElementById('box');
const res = document.getElementById('res');

box.addEventListener('click',function(){
    if(isError){
        box.style.background = '#3474e6';
        box.innerText='点击重新开始';
        isStart = false;
        isError = false;
        return;
    }
    if(!isStart){
        beginTest()
        return;
    }
    if(!isWait){
        clearTimeout(timer);
        box.style.background = '#ff4444';
        box.innerText = '违规提前点击！';
        isError = true;
        return;
    }
	let end = performance.now()
    let time = Math.round(end-start);
    res.innerText = time;
    box.innerText = `用时 ${time} ms`;
    isWait = false;
    isStart = false;
    isError = false;
})

function beginTest(){
    isStart = true;
    res.innerText = ' -- ';
    box.style.background = '#3474e6';
    box.innerText = '等待变色…';
    isWait = false;
    isError = false;
    let delay = Math.random() * 2000 + 1000;
    timer = setTimeout(()=>{
        box.style.background = '#4CAF50';
        box.innerText = '立刻点击!';
        start = performance.now()
        isWait = true;
    },delay)
}
</script>
</body>
</html>
